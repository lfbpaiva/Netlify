# ==========================================
# netlify.toml — configuração do Netlify
# ==========================================
# Como este site é HTML/CSS/JS puro (sem build),
# não precisamos de comando de build nem pasta de publicação especial.
# A raiz do repositório já é o que será publicado.

[build]
  # Sem build: site estático puro
  command = ""
  # Pasta a publicar (raiz do projeto)
  publish = "."

# Headers de segurança e cache
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache agressivo para assets estáticos
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect após envio do formulário para mostrar mensagem de sucesso
[[redirects]]
  from = "/sucesso"
  to = "/?success=true"
  status = 200
